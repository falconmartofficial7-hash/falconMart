<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>FalconMart Production</title><style>body{margin:0;font-family:Arial;background:#eef2f7;color:#111}.top{background:#111827;color:#fff;padding:12px 24px;display:flex;align-items:center;gap:18px}.logo{font-size:28px;font-weight:900;color:#fff}.tag{color:#f6c400;font-size:13px}.search{flex:1;display:flex}.search select,.search input,.search button{padding:12px;border:0}.search input{flex:1;font-size:16px}.search button{background:#f6c400;font-weight:800}.nav{background:#1f2937;color:#fff;padding:10px 24px;display:flex;gap:22px}.hero{margin:22px auto;max-width:1200px;background:linear-gradient(135deg,#0b1d43,#0069d9);color:#fff;border-radius:18px;padding:45px}.grid{max-width:1200px;margin:auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:18px}.card{background:#fff;border-radius:16px;padding:16px;box-shadow:0 6px 20px #0001}.pic{height:150px;background:#f7f0db;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:52px}.price{font-size:24px;color:#0055bb;font-weight:900}.btn{background:#f6c400;border:0;border-radius:8px;padding:10px 14px;font-weight:800;cursor:pointer}.foot{text-align:center;margin:40px;color:#666}@media(max-width:700px){.top{flex-wrap:wrap}.search{order:3;width:100%}.nav{overflow:auto}.hero{margin:12px;border-radius:12px}.grid{margin:12px}}</style></head><body><div class="top"><div><div class="logo">🦅 FalconMart</div><div class="tag">Buy • Sell • Grow Together</div></div><div>📍 Deliver to <select id="country"><option>Pakistan</option><option>United Arab Emirates</option><option>United States</option><option>United Kingdom</option><option>Saudi Arabia</option><option>China</option></select></div><div class="search"><select><option>All</option><option>Electronics</option><option>Fashion</option><option>Grocery</option><option>Wholesale</option></select><input id="q" placeholder="Search FalconMart"><button onclick="searchProducts()">🔍</button></div><button class="btn" onclick="alert('Login module will connect with Firebase Auth')">Sign in</button><button class="btn" onclick="alert('Cart module ready for Firebase cart')">Cart</button></div><div class="nav"><span>All Categories</span><span>Today Deals</span><span>Wholesale</span><span>Import/Export</span><span>Sell on FalconMart</span><span>Customer Service</span></div><section class="hero"><h1>FalconMart Production v1</h1><p>Amazon-style global multi-vendor marketplace foundation.</p><button class="btn">Start Selling</button></section><main class="grid" id="products"></main><div class="foot">© FalconMart — Powered by MY FALCON TRADER (SMC-PRIVATE) LIMITED</div><script>const products=[['Tea','Grocery',1000,'🍵'],['Biscot','Grocery',100,'📦'],['Shoes','Fashion',4500,'👟'],['Mobile','Electronics',65000,'📱'],['Dry Fruits','Wholesale',12000,'🥜'],['Watch','Fashion',3500,'⌚']];function render(list=products){document.getElementById('products').innerHTML=list.map(p=>`<div class="card"><div class="pic">${p[3]}</div><h2>${p[0]}</h2><p>${p[1]} • Stock 1000</p><div class="price">PKR ${p[2].toLocaleString()}</div><button class="btn" onclick="alert('Added to cart: ${p[0]}')">Add to Cart</button> <button class="btn" onclick="alert('Seller Store: Falcon Seller')">Store</button></div>`).join('')}function searchProducts(){const q=document.getElementById('q').value.toLowerCase();render(products.filter(p=>p[0].toLowerCase().includes(q)||p[1].toLowerCase().includes(q)))}render();</script></body></html>
